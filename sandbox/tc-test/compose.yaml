services:
  web-server:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/usr/share/nginx/html
    cap_add:
      - NET_ADMIN
    command: >
      sh -c "apk add --no-cache iproute2 &&
             tc qdisc add dev eth0 root netem delay 20ms 20ms loss 10% &&
             nginx -g 'daemon off;'"